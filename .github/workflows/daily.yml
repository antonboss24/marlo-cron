name: bienici-daily-ingest
on:
  schedule:
    - cron: '0 5 * * *'    # 05:00 UTC = 06:00 Paris (été) / 06:00 (hiver = 07:00 Paris → ajusté plus tard)
  workflow_dispatch:        # bouton "Run workflow" pour test manuel

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90    # 1h30 par batch (les gros dépts 75/13/06/44 + ~17 autres)
    strategy:
      fail-fast: false     # un batch KO n'arrête pas les autres
      max-parallel: 5      # France entière en 5 batches parallèles → ~1h wall time au total
      matrix:
        batch:
          # RECOVER : 28 dépts manquants du run précédent (cancelled cascade).
          # Découpés en 3 batches équilibrés. Restaurer la matrix full France après ce run.
          - { name: 'recover-1', depts: '18,19,2A,32,33,34,35,36,37,38' }
          - { name: 'recover-2', depts: '39,56,57,58,59,67,68,69,70,71' }
          - { name: 'recover-3', depts: '72,73,74,75,76,77,78,79' }
    name: ${{ matrix.batch.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install psql + Python deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y postgresql-client
          python -m pip install -q -r requirements.txt
      - name: Run daily ingest (${{ matrix.batch.name }})
        env:
          MARLO_PG_URL: ${{ secrets.MARLO_PG_URL }}
          DEPTS: ${{ matrix.batch.depts }}
          BIENICI_OUT_DIR: ${{ runner.temp }}/bienici
        run: python3 bienici_daily.py
