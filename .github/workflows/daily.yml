name: bienici-daily-ingest
on:
  workflow_dispatch:        # bouton "Run workflow" pour test manuel
jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 350    # 1h30 par batch (les gros dépts 75/13/06/44 + ~17 autres)
    strategy:
      fail-fast: false     # un batch KO n'arrête pas les autres
      max-parallel: 2      # PRUDENCE : 2 batches max simultanés pour pas saturer le pooler Supabase d'Anton (sa prod tourne dessus). Wall time ~2h30, ta prod reste fluide.
      matrix:
        batch:
          # MODE RECOVER : seulement les 30 dépts manquants du snapshot 01/06 (cancellés hier).
          # À remettre en France entière (5 batches) dès que le snapshot 01/06 est complet.
          - { name: 'recover-A', depts: '04,14,17,18,19,22,2A,32,33,34,35,36,37,38,39' }
          - { name: 'recover-B', depts: '53,55,56,57,58,59,72,73,74,75,76,77,78,79,91' }
    name: ${{ matrix.batch.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install psql + Python deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y postgresql-client
          python -m pip install -q -r requirements.txt
      - name: Run daily ingest (${{ matrix.batch.name }})
        env:
          MARLO_PG_URL: ${{ secrets.MARLO_PG_URL }}
          DEPTS: ${{ matrix.batch.depts }}
          BIENICI_OUT_DIR: ${{ runner.temp }}/bienici
        run: python3 bienici_daily.py
